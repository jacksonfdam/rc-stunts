<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stunts — a web port of the 1990 racing game</title>
    <meta
      name="description"
      content="A browser web port of Stunts (1990): parse the original .TRK tracks, race an AI opponent through ramps, loops, and bridges, and pick from the classic car and driver roster. Built on three.js + cannon-es."
    />
    <link rel="canonical" href="https://rcstunts.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rcstunts.vercel.app/" />
    <meta property="og:title" content="Stunts — a web port of the 1990 racing game" />
    <meta
      property="og:description"
      content="A browser web port of Stunts (1990): parse the original .TRK tracks, race an AI opponent through ramps, loops, and bridges, and pick from the classic car and driver roster. Built on three.js + cannon-es."
    />
    <meta property="og:image" content="https://rcstunts.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="614" />
    <meta property="og:image:alt" content="A car racing a stunt course rebuilt from a classic Stunts track." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stunts — a web port of the 1990 racing game" />
    <meta
      name="twitter:description"
      content="A browser web port of Stunts (1990): parse the original .TRK tracks, race an AI opponent through ramps, loops, and bridges, and pick from the classic car and driver roster. Built on three.js + cannon-es."
    />
    <meta name="twitter:image" content="https://rcstunts.vercel.app/og-image.jpg" />
  </head>
  <body>
    <div id="app"></div>

    <button id="view-btn" class="hidden">◉ Chase</button>

    <div id="panel">
      <h1>Stunts · Web Port</h1>
      <div class="row">Track: <b id="track-name">demo loop</b></div>
      <div class="row">Horizon: <b id="horizon-name">—</b></div>
      <div class="row">Tiles: <b id="tile-count">0</b></div>
      <select id="track-select" title="Pick a bundled community track"></select>
      <label for="trk-file">Load .TRK from disk…</label>
      <input id="trk-file" type="file" accept=".trk,.TRK" />
      <div class="section-label">Car color</div>
      <div id="car-colors"></div>
      <div class="hint">WASD / arrows to drive · Shift boost · Space jump · R respawn · C cockpit</div>
    </div>

    <button id="sound-btn" title="Toggle sound">🔊</button>

    <div id="cockpit" class="hidden">
      <div class="roof"></div>
      <div class="pillar left"></div>
      <div class="pillar right"></div>
      <div class="dash"></div>
      <div class="wheel"></div>
      <div class="gauge"><b id="cockpit-speed">0</b><small>km/h</small></div>
    </div>

    <svg id="crack"></svg>

    <script type="module" src="/src/stunts/main.js"></script>
  </body>
</html>
