<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stunts — web port (track viewer)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #0b1020;
        font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; color: #e5e7eb; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }

      #panel {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(6px);
        border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 10px;
        padding: 12px 14px; font-size: 13px; line-height: 1.5; max-width: 260px;
      }
      #panel h1 { font-size: 15px; margin-bottom: 6px; }
      #panel .row { color: #94a3b8; }
      #panel .row b { color: #e5e7eb; font-weight: 700; }
      #panel label {
        display: inline-block; margin-top: 10px; cursor: pointer;
        background: #2563eb; color: #fff; padding: 6px 10px; border-radius: 8px; font-weight: 700;
      }
      #panel input[type="file"] { display: none; }
      #panel select {
        display: block; width: 100%; margin-top: 10px; padding: 6px 8px;
        background: #0f172a; color: #e5e7eb; font: inherit; font-size: 12px;
        border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 8px; cursor: pointer;
      }
      #panel .hint { margin-top: 8px; font-size: 11px; color: #64748b; }
      #panel .section-label { margin-top: 12px; font-size: 11px; font-weight: 700;
        letter-spacing: 1px; text-transform: uppercase; color: #94a3b8; }
      #car-colors { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; align-items: center; }
      #car-colors .swatch { width: 22px; height: 22px; border-radius: 6px; cursor: pointer;
        border: 2px solid rgba(255,255,255,0.25); }
      #car-colors .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.35); }
      #car-colors input[type="color"] { width: 26px; height: 26px; padding: 0; border: none;
        background: none; cursor: pointer; }

      #speed {
        position: fixed; bottom: 16px; right: 20px; z-index: 10;
        font-weight: 800; font-size: 40px; text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      }
      #speed span { font-size: 16px; color: #94a3b8; margin-left: 4px; }

      #timer {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
        font-variant-numeric: tabular-nums; font-weight: 800; font-size: 34px;
        letter-spacing: 1px; color: #fde047; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      }
      #timer.idle #timer-value { color: #94a3b8; }
      #timer small { display: block; text-align: center; font-size: 11px;
        font-weight: 700; letter-spacing: 2px; color: #94a3b8; text-shadow: none; }
      #lap-info { text-align: center; margin-top: 2px; font-size: 13px; font-weight: 700;
        color: #cbd5e1; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }
      #lap-info b { color: #34d399; }
      #lap-info.hidden { display: none; }

      .hidden { display: none !important; }

      /* Cockpit overlay: A-pillars + dashboard framing the windshield. */
      #cockpit { position: fixed; inset: 0; z-index: 8; pointer-events: none; }
      #cockpit .pillar { position: absolute; top: 0; width: 20vw; height: 62vh; background: #0c0f16; }
      #cockpit .pillar.left { left: 0; clip-path: polygon(0 0, 62% 0, 0 100%); }
      #cockpit .pillar.right { right: 0; clip-path: polygon(38% 0, 100% 0, 100% 100%); }
      #cockpit .roof { position: absolute; top: 0; left: 0; right: 0; height: 8vh;
        background: linear-gradient(#0c0f16, rgba(12,15,22,0)); }
      #cockpit .dash { position: absolute; left: 0; right: 0; bottom: 0; height: 26vh;
        background: linear-gradient(#1a1f2b 0%, #0b0e15 55%, #05070c 100%);
        border-top: 3px solid #05070c;
        clip-path: polygon(0 22%, 22% 6%, 78% 6%, 100% 22%, 100% 100%, 0 100%); }
      #cockpit .wheel { position: absolute; bottom: -9vh; left: 50%; transform: translateX(-50%);
        width: 34vh; height: 34vh; border: 3.2vh solid #14171f; border-radius: 50%;
        box-shadow: inset 0 0 0 1.2vh #0a0c11; }
      #cockpit .wheel::after { content: ''; position: absolute; inset: 46% 8% auto 8%;
        height: 8%; background: #14171f; border-radius: 3px; }
      #cockpit .gauge { position: absolute; bottom: 4vh; left: 24%; transform: translateX(-50%);
        text-align: center; color: #fde047; font-variant-numeric: tabular-nums;
        text-shadow: 0 2px 6px rgba(0,0,0,0.8); }
      #cockpit .gauge b { font-size: 42px; font-weight: 800; }
      #cockpit .gauge small { display: block; font-size: 12px; font-weight: 700;
        letter-spacing: 2px; color: #94a3b8; }

      /* Cracked-windshield overlay, shown on a hard crash. */
      #crack { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9;
        pointer-events: none; opacity: 0; transition: opacity 0.12s ease-out; }
      #crack.show { opacity: 0.92; }
      #crack line { stroke: #f8fafc; stroke-linecap: round; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="panel">
      <h1>Stunts · Web Port</h1>
      <div class="row">Track: <b id="track-name">demo loop</b></div>
      <div class="row">Horizon: <b id="horizon-name">—</b></div>
      <div class="row">Tiles: <b id="tile-count">0</b></div>
      <select id="track-select" title="Pick a bundled community track"></select>
      <label for="trk-file">Load .TRK from disk…</label>
      <input id="trk-file" type="file" accept=".trk,.TRK" />
      <div class="section-label">Car color</div>
      <div id="car-colors"></div>
      <div class="hint">WASD / arrows to drive · Shift boost · Space jump · R respawn · C cockpit</div>
    </div>

    <div id="timer" class="idle">
      <small id="timer-label">TIME</small>
      <span id="timer-value">0:00.000</span>
      <div id="lap-info" class="hidden">Lap <b id="lap-count">1</b> · Best <span id="best-lap">—</span></div>
    </div>

    <div id="speed"><b id="speed-value">0</b><span>km/h</span></div>

    <div id="cockpit" class="hidden">
      <div class="roof"></div>
      <div class="pillar left"></div>
      <div class="pillar right"></div>
      <div class="dash"></div>
      <div class="wheel"></div>
      <div class="gauge"><b id="cockpit-speed">0</b><small>km/h</small></div>
    </div>

    <svg id="crack"></svg>

    <script type="module" src="/src/stunts/main.js"></script>
  </body>
</html>
